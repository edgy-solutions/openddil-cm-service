name: Docker Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  packages: write

# Publishes ghcr.io/edgy-solutions/openddil/cm-service:latest, which is what
# openddil-demo/docker-compose.yml references for BOTH the cm-service main
# container and the cm-service-bootstrap one-shot (same image, different
# entrypoint). `${{ github.repository_owner }}` resolves to `edgy-solutions`.

jobs:
  build-cm-service:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build cm-service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/openddil/cm-service:latest
