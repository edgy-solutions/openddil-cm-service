[project]
name = "openddil-cm-service"
version = "0.1.0"
description = "OpenDDIL Configuration Management Service — As-Maintained state + Discrepancy detection"
requires-python = ">=3.11"
dependencies = [
    # CM service runs on Restate per ADR-0014, not Faust. Restate provides
    # Virtual Object durable state + scheduled callbacks; we get the
    # transition-cache durability and per-asset recheck timers for free.
    "restate-sdk>=0.18.0,<1.0.0",
    "hypercorn>=0.17.0,<1.0.0",          # ASGI server for restate.app()
    # Kafka ingress arrives via Restate's Kafka subscription (admin API,
    # not Python). The producer below is for the egress path: emitting
    # asset-cm-state and tactical-events from handler side-effects.
    "confluent-kafka>=2.0.0,<3.0.0",
    # Gencode in openddil-contracts/gen/python was generated by
    # grpcio-tools 6.31.1; the runtime must match that major version.
    "protobuf>=6.30.0,<7.0.0",
    "cloudevents>=1.10.0,<2.0.0",
    "pyyaml>=6.0",
    "prometheus-client>=0.20.0,<1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["src/tests"]
addopts = "--cov=src --cov-report=term-missing"
